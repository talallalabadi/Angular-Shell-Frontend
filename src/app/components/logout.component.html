<h1>LOGOUT</h1>
<div class="logout-container">
  <div class="card">
    <div class="card-body text-center">
      <h2 class="mb-4">Logout</h2>
      <p class="mb-4">Are you sure you want to sign out?</p>
      <div class="button-group">
        <button class="btn btn-danger btn-lg mr-3" (click)="logout()">
          Sign Out
        </button>
        <button class="btn btn-secondary btn-lg" routerLink="/search">
          Cancel
        </button>
      </div>
    </div>
  </div>
</div>
